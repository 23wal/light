---
name: Build pages
on:
  push:
    branches: ["**"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  ibom:
    runs-on: ubuntu-latest
    env:
      PCBPATH: "dmx2vga/kicad/dmx2vga.kicad_pcb"
      ARGS: "--layer-view F"
    container:
      image: docker.io/kicad/kicad:8.0
      options: --user root
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup KiCad environment
        run: |
          apt-get update -qq
          apt-get install -y xvfb
          git clone https://github.com/openscopeproject/InteractiveHtmlBom.git

      - name: Generate Interactive BOM
        run: |
          mkdir public
          xvfb-run python3 InteractiveHtmlBom/InteractiveHtmlBom/generate_interactive_bom.py --no-browser $ARGS $PCBPATH --dest-dir "$(pwd)/public"

      - name: Rename to dmx2vga.html
        run: mv public/ibom.html public/dmx2vga.html

      - uses: actions/upload-artifact@v4
        with:
          name: ibom
          path: public

  jekyll:
    needs:
      - ibom
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        uses: actions/jekyll-build-pages@v1

      - name: Download ibom artifact
        uses: actions/download-artifact@v4
        with:
          name: ibom

      - name: Add bom.html
        run: sudo mv dmx2vga.html _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    runs-on: ubuntu-latest
    needs: jekyll
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
